<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <title>Activa tu cuenta</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #F0F2F5;
            font-family: 'Inter', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            padding: 48px 16px;
        }

        .container {
            max-width: 540px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 8px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background-color: #1A56DB;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .brand-name {
            font-size: 17px;
            font-weight: 600;
            color: #1E2A3B;
            letter-spacing: -0.2px;
        }

        /* Card */
        .card {
            background-color: #FFFFFF;
            border-radius: 16px;
            padding: 48px 44px;
            margin-top: 28px;
            border: 1px solid #E4E7EC;
        }

        /* Indicator line */
        .indicator {
            width: 40px;
            height: 4px;
            background-color: #1A56DB;
            border-radius: 2px;
            margin-bottom: 32px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1E2A3B;
            letter-spacing: -0.4px;
            line-height: 1.3;
            margin-bottom: 14px;
        }

        .description {
            font-size: 15px;
            color: #5A6478;
            line-height: 1.65;
            margin-bottom: 36px;
        }

        .description strong {
            color: #1E2A3B;
            font-weight: 500;
        }

        /* CTA Button */
        .btn-wrapper {
            margin-bottom: 36px;
        }

        .btn {
            display: inline-block;
            background-color: #1A56DB;
            color: #FFFFFF !important;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 14px 32px;
            border-radius: 8px;
            letter-spacing: 0.1px;
            transition: background-color 0.2s;
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid #E4E7EC;
            margin-bottom: 28px;
        }

        /* Fallback link */
        .fallback {
            font-size: 13px;
            color: #8A94A6;
            line-height: 1.6;
        }

        .fallback a {
            color: #1A56DB;
            text-decoration: none;
            word-break: break-all;
        }

        /* Expiry notice */
        .expiry {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #F8F9FB;
            border: 1px solid #E4E7EC;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 24px;
        }

        .expiry-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #F59E0B;
            flex-shrink: 0;
        }

        .expiry-text {
            font-size: 12.5px;
            color: #8A94A6;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 28px;
            padding-bottom: 8px;
        }

        .footer p {
            font-size: 12.5px;
            color: #A0A8B4;
            line-height: 1.6;
        }

        .footer a {
            color: #A0A8B4;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 28px;
            }

            .title {
                font-size: 21px;
            }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">

        <!-- Brand -->
        <div class="header">
            <span class="brand">
                <span class="brand-icon">
                    <!-- Icon placeholder: replace with your logo <img> if needed -->
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 2L15.5 5.5V12.5L9 16L2.5 12.5V5.5L9 2Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
                        <circle cx="9" cy="9" r="2.5" fill="white"/>
                    </svg>
                </span>
                <span class="brand-name">ToDo</span>
            </span>
        </div>

        <!-- Card -->
        <div class="card">
            <div class="indicator"></div>

            <h1 class="title">Activa tu cuenta</h1>

            <p class="description">
                Hola <strong th:text="${userName}">Usuario</strong>, gracias por registrarte.
                Para empezar a usar tu cuenta solo necesitas confirmar tu dirección de correo
                haciendo clic en el botón de abajo.
            </p>

            <div class="btn-wrapper">
                <a th:href="${activationUrl}" class="btn">
                    Activar mi cuenta
                </a>
            </div>

            <hr class="divider"/>

            <div class="expiry">
                <span class="expiry-dot"></span>
                <span class="expiry-text">
                    Este enlace expira en
                    <strong th:text="${expirationHours}">24</strong> horas.
                    Si no creaste esta cuenta, puedes ignorar este mensaje.
                </span>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>
                © <span th:text="${currentYear}">2025</span>
                <span >ToDO</span>
            </p>
        </div>

    </div>
</div>
</body>
</html>
